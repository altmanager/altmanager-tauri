name: Release

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Get release version from tag
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        shell: bash
        run: |
          TAG=${{ github.event.release.tag_name }}
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
        id: version

      - name: Set Cargo.toml version
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        run: |
          cargo install --force cargo-edit
          cargo set-version ${{ steps.version.outputs.VERSION }} --manifest-path src-tauri/Cargo.toml

      - name: Update tauri.conf.json
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const path = "src-tauri/tauri.conf.json";
            const version = "${{ steps.version.outputs.VERSION }}";
            const json = JSON.parse(fs.readFileSync(path, "utf8"));
            json.version = version;
            fs.writeFileSync(path, JSON.stringify(json, null, 2));

      - name: Update npm package version
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        run: |
          npm version ${{ steps.version.outputs.VERSION }} --git-tag-version=false

      - name: Install Rust
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Install dependencies
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        run: npm ci

      - name: Generate icons
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        run: npx tauri icon src-tauri/icons/icon.svg

      - name: Download altmanager-web dist
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download \
            --repo altmanager/altmanager-web \
            --pattern "dist.zip" \
            --dir .
          unzip dist.zip

      - name: Download altmanager-ws binary
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download \
            --repo altmanager/altmanager-ws \
            --pattern "altmanager-ws-${{ matrix.target }}*" \
            --dir src-tauri/binaries/

      - name: Mark binary executable
        if: runner.os != 'Windows'
        run: chmod +x src-tauri/binaries/altmanager-ws-${{ matrix.target }}

      - name: Build Tauri app
        if: ${{ !(github.event.release.prerelease && runner.os == 'Windows') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ github.event.release.id }}
          releaseDraft: false
          prerelease: ${{ github.event.release.prerelease }}
          target: ${{ matrix.target }}
          args: --target ${{ matrix.target }}
